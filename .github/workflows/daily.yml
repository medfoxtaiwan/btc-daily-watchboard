name: Daily BTC data update

on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC = 08:00 台灣時間
  workflow_dispatch: {}     # 允許手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch latest data
        run: python3 fetch_data.py || echo "::warning::fetch failed (likely rate limit) — keeping previous data.json"
      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json dominance_history.json
          if git diff --staged --quiet; then
            echo "No data change."
          else
            git commit -m "chore: daily data update ($(date -u +%Y-%m-%d))"
            git push
          fi
      - name: Freshness gate (job red if data stale)
        run: |
          python3 - <<'PY'
          import json, datetime
          d = json.load(open("data.json"))
          dt = d.get("data_through")
          if not dt:
              print("::error::data_through 缺失"); raise SystemExit(1)
          lag = (datetime.date.today() - datetime.date.fromisoformat(dt)).days
          print(f"data_through={dt}, lag={lag}d (on-chain 正常約 2 天)")
          if lag > 3:
              print(f"::error::STALE — 資料已 {lag} 天未更新（>3）。上游(bitcoin-data)可能限流/中斷，看板顯示值已過期。")
              raise SystemExit(1)
          print("freshness OK")
          PY
