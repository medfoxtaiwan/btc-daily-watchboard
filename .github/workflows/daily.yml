name: Daily BTC data update

on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC = 08:00 台灣時間
  workflow_dispatch: {}     # 允許手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch latest data
        run: python3 fetch_data.py || echo "::warning::fetch failed (likely rate limit) — keeping previous data.json"
      - name: Commit data.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No data change."
          else
            git commit -m "chore: daily data update ($(date -u +%Y-%m-%d))"
            git push
          fi
